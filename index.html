<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlock PDF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="app-header">
        <div class="app-logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C9.24 2 7 4.24 7 7V10H6C4.9 10 4 10.9 4 12V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V12C20 10.9 19.1 10 18 10H17V7C17 4.24 14.76 2 12 2ZM12 4C13.66 4 15 5.34 15 7V10H9V7C9 5.34 10.34 4 12 4Z" fill="url(#lockGradient)"/>
            <path d="M12 14C10.9 14 10 14.9 10 16C10 16.74 10.4 17.38 11 17.72V19C11 19.55 11.45 20 12 20C12.55 20 13 19.55 13 19V17.72C13.6 17.38 14 16.74 14 16C14 14.9 13.1 14 12 14Z" fill="#0c0c14"/>
            <defs>
              <linearGradient id="lockGradient" x1="4" y1="2" x2="20" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#a78bfa"/>
                <stop offset="1" stop-color="#7c3aed"/>
              </linearGradient>
            </defs>
          </svg>
          <h1>Unlock PDF</h1>
        </div>
        <p class="app-subtitle">Hapus password dari file PDF dengan mudah</p>
      </header>

      <!-- Drop Zone -->
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <div class="drop-zone-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 2H6C4.9 2 4 2.9 4 4V20C4 21.1 4.9 22 6 22H18C19.1 22 20 21.1 20 20V8L14 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              <line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="9" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <p class="drop-zone-text">Seret file PDF ke sini</p>
          <p class="drop-zone-hint">atau <button id="browseBtn" class="browse-link">pilih file</button></p>
        </div>
      </div>

      <!-- File List -->
      <div id="fileListContainer" class="file-list-container hidden">
        <div class="file-list-header">
          <span class="file-count" id="fileCount">0 file</span>
          <button id="clearAllBtn" class="clear-all-btn">Hapus semua</button>
        </div>
        <ul id="fileList" class="file-list"></ul>
      </div>

      <!-- Password & Unlock -->
      <div id="actionSection" class="action-section hidden">
        <div class="password-group">
          <div class="password-input-wrapper">
            <svg class="password-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 11V7C7 4.24 9.24 2 12 2C14.76 2 17 4.24 17 7V11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input
              type="password"
              id="passwordInput"
              class="password-input"
              placeholder="Masukkan password PDF..."
              autocomplete="off"
            />
            <button id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
              <svg class="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 12C1 12 5 4 12 4C19 4 23 12 23 12C23 12 19 20 12 20C5 20 1 12 1 12Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <svg class="eye-off-icon hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.94 17.94C16.23 19.24 14.18 20 12 20C5 20 1 12 1 12C2.24 9.68 3.97 7.65 6.06 6.06M9.9 4.24C10.59 4.08 11.29 4 12 4C19 4 23 12 23 12C22.39 13.13 21.66 14.18 20.83 15.12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
        <button id="unlockBtn" class="unlock-btn" disabled>
          <svg class="unlock-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 11V7C7 4.24 9.24 2 12 2C13.65 2 15.1 2.82 16 4.09" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Unlock PDF</span>
        </button>
      </div>

      <!-- Status Bar -->
      <div id="statusBar" class="status-bar hidden">
        <div class="status-content">
          <div class="status-icon" id="statusIcon"></div>
          <span class="status-text" id="statusText"></span>
        </div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
